<!DOCTYPE html>
<html>
<body>
<fieldset>
<form>
    <h2>Register for Event</h2>

    <label>Name:</label>
    <input type="text" required>

    <label>Email:</label>
    <input type="email" required>

    <label>Number of Tickets:</label>
    <input type="number" min="1" required>

    <button type="submit">Confirm Booking</button>
</form>
</body>
</fieldset>
</html>
